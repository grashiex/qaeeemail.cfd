   🎨 THEME CONFIGURATION AREA

/* 5. Theme: Edgy (Cyberpunk) */
body.theme-edgy {

/* 6. Theme: Purple Retro */

/* 8. Theme: Blue Techy */
body.theme-blue-techy {

/* 9. Theme: Dark Hightech (Revamped) */
body.theme-dark-hightech {

/* =========================================
   CRITICAL FIX: Dropdown Option Visibility
   ========================================= */
select option {
  background-color: #ffffff !important;
  color: #000000 !important;

/* =========================================
   CORE STYLES
   ========================================= */
body {
  background-color: var(--bg-color);
  background-image: var(--bg-image);
  background-size: var(--bg-size);
  background-attachment: fixed;
  background-position: center;
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  transition: background-image 0.5s, background-color 0.3s, color 0.3s;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.glass-effect { backdrop-filter: blur(var(--backdrop-blur)); -webkit-backdrop-filter: blur(var(--backdrop-blur)); }
html { scrollbar-width: none; overflow-y: scroll; }
body { scrollbar-width: none; -ms-overflow-style: none; }
::-webkit-scrollbar { display: none !important; width: 0px; background: transparent; }

.custom-input { background-color: var(--card-bg); color: var(--text-main); border-color: var(--border-color); }
.custom-input:focus { outline: none; border-color: var(--primary); }

/* Email Sandbox */
.email-content-wrapper { font-family: Arial, sans-serif; line-height: 1.6; width: 100%; overflow-x: auto; word-wrap: break-word; overflow-wrap: break-word; }
.email-content-wrapper table, .email-content-wrapper img, .email-content-wrapper iframe { max-width: 100% !important; height: auto !important; }
@media only screen and (max-width: 600px) {
  .email-content-wrapper table, .email-content-wrapper tr, .email-content-wrapper td { display: block !important; width: 100% !important; box-sizing: border-box !important; height: auto !important; }
  .email-content-wrapper td { padding-left: 0 !important; padding-right: 0 !important; }
}

/* Modern Theme-Adaptive Loader */
#loader-overlay { 
  position: fixed; 
  inset: 0; 
  z-index: 9999; 
  background-color: var(--bg-color); 
  background-image: var(--bg-image);
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
  display: flex; 
  justify-content: center; 
  align-items: center; 
  transition: opacity 0.5s ease-out, visibility 0.5s; 
}
#loader-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  backdrop-filter: blur(var(--backdrop-blur));
  -webkit-backdrop-filter: blur(var(--backdrop-blur));
  z-index: -1;
}

.loader-content {
  background-color: var(--card-bg);
  padding: 40px 60px;
  border-radius: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  border: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  transform: translateY(0);
  animation: loader-entrance 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes loader-entrance {
  0% { opacity: 0; transform: translateY(20px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.loader-icon-container {
  position: relative;
  width: 72px;
  height: 72px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.loader-icon {
  font-size: 2.5rem;
  color: var(--primary);
  z-index: 2;
  animation: bounce-soft 2s infinite ease-in-out;
}

.loader-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 3px solid transparent;
  border-top-color: var(--primary);
  border-right-color: var(--primary);
  opacity: 0.8;
  animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
}

.loader-ring::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  border: 3px solid transparent;
  border-left-color: var(--primary);
  border-bottom-color: var(--primary);
  opacity: 0.4;
  animation: spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
}

.loader-text {
  color: var(--text-main);
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 4px;
}

.loader-dots {
  display: flex;
  gap: 2px;
}

.loader-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background-color: var(--primary);
  animation: pulse-dot 1.5s infinite;
}
.loader-dot:nth-child(2) { animation-delay: 0.2s; }
.loader-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes bounce-soft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes pulse-dot { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.5); } }
  </style>
